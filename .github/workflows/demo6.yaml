name: CI Pipeline with Outputs

on:
  push:

jobs:
  # ✅ JOB 1: Build
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ✅ Step: Generate version (like build version)
      - name: Set version output
        id: step1
        run: |
          VERSION="v1.0.${{ github.run_number }}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      # ✅ Step: Use step1 output in step2
      - name: Print version (step1 output)
        id: step2
        run: echo "Build version is ${{ steps.step1.outputs.version }}"

    outputs: #to send the ouput another job as a variable app_version
      app_version: ${{ steps.step1.outputs.version }}

  # ✅ JOB 2: Test
  test:
    runs-on: ubuntu-latest
    needs: build #sequential
    steps:
      - name: Run tests #creating output in step level
        id: test_step1
        run: |
          echo "status=SUCCESS" >> $GITHUB_OUTPUT

      - name: Print test result #printing the output in step2
        run: echo "Test result is ${{ steps.test_step1.outputs.status }}"
        
    outputs: #to send the ouput another job as a varible test_status
      test_status: ${{ steps.test_step1.outputs.status }}

  # ✅ JOB 3: Deploy
  deploy:
    runs-on: ubuntu-latest
    needs:
      - build
      - test

    steps:
      - name: Print version from build job
        run: |
          echo "Deploying version ${{ needs.build.outputs.app_version }}"

      - name: Check test status before deploy
        run: |
          echo "Test status is ${{ needs.test.outputs.test_status }}"

      # ✅ Conditional deploy (real-world logic)
      - name: Deploy application
        if: needs.test.outputs.test_status == 'SUCCESS'
        run: |
          echo "Deployment started 🚀"
          echo "Version: ${{ needs.build.outputs.app_version }}"
